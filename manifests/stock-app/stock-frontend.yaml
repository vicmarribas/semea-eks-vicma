apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-frontend
  namespace: stock-demo
  labels:
    app: stock-frontend
    team: semea
    tags.datadoghq.com/env: "demo"
    tags.datadoghq.com/service: "stock-frontend"
    tags.datadoghq.com/version: "1.0.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-frontend
  template:
    metadata:
      labels:
        app: stock-frontend
        team: semea
        tags.datadoghq.com/env: "demo"
        tags.datadoghq.com/service: "stock-frontend"
        tags.datadoghq.com/version: "1.0.0"
      annotations:
        ad.datadoghq.com/stock-frontend.logs: |
          [{"source": "nodejs", "service": "stock-frontend"}]
    spec:
      containers:
        - name: stock-frontend
          image: public.ecr.aws/datadog/apps/stock-frontend:latest
          ports:
            - containerPort: 3000
          env:
            - name: DD_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/env']
            - name: DD_SERVICE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/service']
            - name: DD_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['tags.datadoghq.com/version']
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: BACKEND_URL
              value: "http://stock-backend"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: stock-frontend
  namespace: stock-demo
spec:
  selector:
    app: stock-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
