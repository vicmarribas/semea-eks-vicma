{{- if not .Values.datadog.apiKey }}
  {{- fail "datadog.apiKey is required. Pass it with --set datadog.apiKey=<your-key>" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stock-demo.secretName" . }}
  namespace: {{ include "stock-demo.namespace" . }}
  labels:
    {{- include "stock-demo.labels" . | nindent 4 }}
type: Opaque
stringData:
  dd-api-key: {{ .Values.datadog.apiKey | quote }}
  postgres-password: {{ .Values.postgres.password | quote }}
  database-url: "postgresql://{{ .Values.postgres.user }}:{{ .Values.postgres.password }}@{{ .Release.Name }}-db:5432/{{ .Values.postgres.database }}"
